                <div className="fixed inset-0 z-[200] flex items-center justify-center px-5 bg-black/50 backdrop-blur-sm transition-all animate-fade-in">
                    <div className="bg-white rounded-2xl w-full max-w-sm text-center relative overflow-hidden animate-scale-up p-7 shadow-2xl border-[3px] border-skin-peach/80">
                        <div className="relative z-10">
                            <h2 className="text-[22px] font-black text-skin-rose mb-5 leading-tight tracking-tight drop-shadow-sm">
                                1周年記念キャンペーン！
                            </h2>
                            
                            <div className="bg-skin-cream rounded-xl p-5 mb-5 border border-skin-blush/40 shadow-sm">
                                <p className="text-[17px] font-bold text-skin-dark leading-relaxed">
                                    お友達登録で<span className="text-skin-rose border-b-2 border-skin-rose pb-0.5">クーポンゲット！</span>
                                </p>
                                <p className="text-xs text-skin-rose font-bold mt-2 leading-relaxed">
                                    ⚠️72時間以内のご予約で初回価格が適用されます。お早めに！
                                </p>
                            </div>

                            <div className="mb-6">
                                <img src="./images/popup-bonus.png" alt="特典" className="w-full h-auto rounded-xl shadow-md border border-skin-peach/30" />
                            </div>

                            <button 
                                onClick={onClose}
                                className="w-full bg-skin-rose text-white font-bold text-base py-4 rounded-xl shadow-md hover:-translate-y-0.5 hover:shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2 group"
                            >
                                <span>続きを見る</span>
                                <i className="fas fa-chevron-right text-sm group-hover:translate-x-1 transition-transform"></i>
                            </button>
                            
                            <div className="mt-5">
                                <span className="text-xs font-bold text-skin-text/80 bg-skin-cream/80 px-3 py-1.5 rounded-md border border-skin-peach/50 inline-block">
                                    ※定員に達し次第、終了となります
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        /* ─── App ─── */
        const App = () => {
            const [showPopup, setShowPopup] = useState(true);
            
            useEffect(() => { 
                window.scrollTo(0, 0); 
                if (showPopup) {
                    document.body.style.overflow = 'hidden';
                } else {
                    document.body.style.overflow = 'unset';
                }
            }, [showPopup]);

            return (
                <div className="w-full max-w-md mx-auto shadow-xl bg-white min-h-screen relative my-0 md:my-8">
                    {showPopup && <CampaignPopup onClose={() => setShowPopup(false)} />}
                    <StickyHeader />
                    <Headline />
                    <EmpathySection />
                    <ProblemSection />
                    <CauseSection />
                    <SolutionSection />
                    <BenefitSection />
                    <FeatureSection />
                    <BonusSection />
                    <CustomerVoiceSection />
                    <ReviewsSection />
                    <QASection />
                    <FinalCTA />
                    <Footer />
                    <StickyCTA />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        requestAnimationFrame(() => { window.scrollTo(0, 0); });
    </script>
</body>

</html>
